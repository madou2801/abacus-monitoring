# Nginx config for health endpoint
# Add inside the server block for api.monpermiscpf.com

# Rate limiting zone (add in http block if not exists)
# limit_req_zone $binary_remote_addr zone=health:1m rate=10r/h;

location /health-report {
    # Rate limit
    limit_req zone=health burst=2 nodelay;

    # Proxy to health aggregator
    proxy_pass http://127.0.0.1:3850;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_connect_timeout 15s;
    proxy_read_timeout 30s;
}
